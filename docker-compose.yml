services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - CURRENT_MODEL_VERSION=${CURRENT_MODEL_VERSION:-v1}
      - DATABASE_URL=sqlite:///data/agrimlops.db
      - LABEL_MAP_PATH=models/label_map.json
      - UPLOAD_DIR=data/feedback/uploads
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
